<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Portfolio</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #0f172a;
            --text-light: #f8fafc;
            --accent: #38bdf8;
            --card-bg: #1e293b;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            padding-top: 80px;
        }

        /* NAVBAR */
        .navbar {
            background-color: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            padding: 1rem 0;
        }

        .navbar-brand {
            font-weight: 700;
            color: var(--text-light) !important;
            font-size: 1.5rem;
        }

        .nav-link {
            color: #94a3b8 !important;
            font-weight: 500;
            transition: 0.3s;
            margin-left: 15px;
        }

        .nav-link:hover,
        .nav-link.active {
            color: var(--accent) !important;
        }

        /* FORM */
        .form-control {
            background-color: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-light);
            padding: 15px;
        }

        .form-control:focus {
            background-color: var(--card-bg);
            border-color: var(--accent);
            color: var(--text-light);
            box-shadow: none;
        }

        .btn-custom {
            background-color: var(--accent);
            color: var(--bg-dark);
            font-weight: 600;
            padding: 12px 30px;
            border-radius: 50px;
            border: none;
            transition: 0.3s;
            width: 100%;
        }

        .btn-custom:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(56, 189, 248, 0.3);
            color: var(--bg-dark);
        }

        /* FOOTER */
        footer {
            border-top: 1px solid rgba(255,255,255,0.08);
            padding: 30px 0;
            text-align: center;
            margin-top: 80px;
        }

        footer p {
            color: #64748b;
            margin-bottom: 10px;
        }

        footer a {
            color: var(--accent);
            margin: 0 12px;
            font-size: 1.4rem;
            transition: .3s;
        }

        footer a:hover {
            color: #94a3b8;
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
        <a class="navbar-brand" href="portfolio.html">Shreya Pandey</a>
        <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="portfolio.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="portfolio about.html">About</a></li>
                <li class="nav-item"><a class="nav-link" href="portfolio services.html">Services</a></li>
                <li class="nav-item"><a class="nav-link" href="portfolio work.html">Work</a></li>
                <li class="nav-item"><a class="nav-link active" href="portfolio contact.html">Contact</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- CONTACT -->
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6 text-center mb-5 gs-up">
            <h2 class="fw-bold">Get In Touch</h2>
            <p style="color:#94a3b8;">Have a project? Drop me a line.</p>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-5 gs-up">
            <div class="p-4" style="background:var(--card-bg); border-radius:15px; border:1px solid rgba(255,255,255,0.05);">
                <form>
                    <div class="mb-3">
                        <label class="form-label" style="color:#94a3b8;">Name</label>
                        <input type="text" class="form-control" placeholder="Your Name">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" style="color:#94a3b8;">Email</label>
                        <input type="email" class="form-control" placeholder="name@example.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" style="color:#94a3b8;">Message</label>
                        <textarea class="form-control" rows="5" placeholder="Tell me about your project..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-custom">Send Message</button>
                </form>
            </div>

            <div class="text-center mt-4">
                <p style="color:#94a3b8;">
                </p>
            </div>
        </div>
    </div>
</div>

<!-- FOOTER -->
<footer>
    <p>&copy; 2026 Shreya Pandey. All rights reserved.</p>
    <div>
        <a href="https://www.instagram.com/sweet__soul_2006?igsh=ZGNhN3Jja25zcnE1"><i class="fab fa-instagram"></i></a>
        <a href="https://www.linkedin.com/in/shreya-pandey-webdev"><i class="fab fa-linkedin"></i></a>
        <a href="https://github.com/Shreya2004449"><i class="fab fa-github"></i></a>
    </div>
</footer>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script>
    gsap.from(".gs-up", {
        y: 50,
        opacity: 0,
        duration: 1,
        stagger: 0.2,
        ease: "power3.out"
    });
</script>

</body>
</html>
